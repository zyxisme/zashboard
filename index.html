<!doctype html>
<html lang="">
  <head>
    <meta charset="UTF-8" />
    <title>zashboard</title>
    <meta
      name="viewport"
      content="user-scalable=no, width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
    />
    <meta
      name="description"
      content="A dashboard using clash API"
    />
    <link
      rel="apple-touch-icon"
      href="./apple-touch-icon.png"
    />
    <link
      rel="icon"
      href="./favicon.ico"
      sizes="48x48"
    />
    <link
      id="favicon"
      rel="icon"
      href="./favicon.svg"
      sizes="any"
      type="image/svg+xml"
    />
    <meta
      name="theme-color"
      content="#FFFFFF"
    />
    <meta
      name="rocket-loader"
      content="false"
    />
  </head>
  <body class="h-dvh w-screen">
    <div id="app"></div>
    <div
      id="error-display"
      style="
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        background: red;
        color: white;
        padding: 10px;
        z-index: 999999;
        font-size: 12px;
        display: none;
        white-space: pre-wrap;
        word-break: break-all;
      "
    ></div>
    <script>
      ;(function () {
        var ed = document.getElementById('error-display')
        window.onerror = function (msg, src, line, col, err) {
          ed.style.display = 'block'
          ed.textContent += 'ERROR: ' + msg + ' (' + src + ':' + line + ':' + col + ')\n'
        }
        window.addEventListener('unhandledrejection', function (e) {
          ed.style.display = 'block'
          ed.textContent +=
            'PROMISE REJECTION: ' + (e.reason ? e.reason.message || e.reason : e) + '\n'
        })
        window.addEventListener(
          'error',
          function (e) {
            if (e.target && (e.target.tagName === 'LINK' || e.target.tagName === 'SCRIPT')) {
              ed.style.display = 'block'
              ed.textContent += 'RESOURCE ERROR: ' + (e.target.href || e.target.src) + '\n'
            }
          },
          true,
        )
        setTimeout(function () {
          var app = document.getElementById('app')
          if (app && app.children.length === 0) {
            ed.style.display = 'block'
            ed.textContent += 'TIMEOUT: Vue app did not mount after 5s. #app is empty.\n'
          }
        }, 5000)
      })()
    </script>
    <script>
      ;(function () {
        const media = window.matchMedia('(prefers-color-scheme: dark)')
        const favicon = document.getElementById('favicon')
        const setFavicon = (isDark) => {
          favicon.href = isDark ? './favicon-dark.svg' : './favicon.svg'
        }

        media.addEventListener('change', () => {
          setFavicon(media.matches)
        })
        setFavicon(media.matches)
      })()
    </script>
    <script
      type="module"
      src="/src/main.ts"
    ></script>
  </body>
</html>
