<!doctype html>
<html lang="">
  <head>
    <meta charset="UTF-8" />
    <title>zashboard</title>
    <meta
      name="viewport"
      content="user-scalable=no, width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
    />
    <meta
      name="description"
      content="A dashboard using clash API"
    />
    <link
      rel="apple-touch-icon"
      href="./apple-touch-icon.png"
    />
    <link
      rel="icon"
      href="./favicon.ico"
      sizes="48x48"
    />
    <link
      id="favicon"
      rel="icon"
      href="./favicon.svg"
      sizes="any"
      type="image/svg+xml"
    />
    <meta
      name="theme-color"
      content="#FFFFFF"
    />
    <meta
      name="rocket-loader"
      content="false"
    />
  </head>
  <body class="h-dvh w-screen">
    <div id="app"></div>
    <div
      id="debug-banner"
      style="
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        background: #00cc00;
        color: white;
        padding: 8px 10px;
        z-index: 999999;
        font-size: 11px;
        font-family: monospace;
        white-space: pre-wrap;
        word-break: break-all;
      "
    >
      ZASHBOARD DEBUG: HTML loaded, inline JS running...
    </div>
    <script>
      ;(function () {
        var db = document.getElementById('debug-banner')
        db.textContent += '\nInline script executed OK.'
        window.onerror = function (msg, src, line, col, err) {
          db.style.background = 'red'
          db.textContent += '\nJS ERROR: ' + msg + ' (' + src + ':' + line + ')'
        }
        window.addEventListener('unhandledrejection', function (e) {
          db.style.background = 'red'
          db.textContent += '\nPROMISE REJECT: ' + (e.reason ? e.reason.message || e.reason : e)
        })
        window.addEventListener(
          'error',
          function (e) {
            if (e.target && (e.target.tagName === 'LINK' || e.target.tagName === 'SCRIPT')) {
              db.style.background = 'red'
              db.textContent += '\nRESOURCE FAIL: ' + (e.target.href || e.target.src)
            }
          },
          true,
        )
        setTimeout(function () {
          var app = document.getElementById('app')
          db.textContent += '\n5s check: #app has ' + app.children.length + ' children.'
          if (app.children.length === 0) {
            db.style.background = 'red'
            db.textContent += ' Vue did NOT mount!'
          } else {
            db.textContent += ' Vue mounted OK.'
          }
        }, 5000)
      })()
    </script>
    <script>
      ;(function () {
        const media = window.matchMedia('(prefers-color-scheme: dark)')
        const favicon = document.getElementById('favicon')
        const setFavicon = (isDark) => {
          favicon.href = isDark ? './favicon-dark.svg' : './favicon.svg'
        }

        media.addEventListener('change', () => {
          setFavicon(media.matches)
        })
        setFavicon(media.matches)
      })()
    </script>
    <script
      type="module"
      src="/src/main.ts"
    ></script>
  </body>
</html>
