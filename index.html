<!doctype html>
<html lang="">
  <head>
    <meta charset="UTF-8" />
    <title>zashboard</title>
    <meta
      name="viewport"
      content="user-scalable=no, width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
    />
    <meta
      name="description"
      content="A dashboard using clash API"
    />
    <link
      rel="apple-touch-icon"
      href="./apple-touch-icon.png"
    />
    <link
      rel="icon"
      href="./favicon.ico"
      sizes="48x48"
    />
    <link
      id="favicon"
      rel="icon"
      href="./favicon.svg"
      sizes="any"
      type="image/svg+xml"
    />
    <meta
      name="theme-color"
      content="#FFFFFF"
    />
    <meta
      name="rocket-loader"
      content="false"
    />
  </head>
  <body class="h-dvh w-screen">
    <div id="app"></div>
    <div
      id="debug-banner"
      style="
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        background: #00cc00;
        color: white;
        padding: 8px 10px;
        z-index: 999999;
        font-size: 11px;
        font-family: monospace;
        white-space: pre-wrap;
        word-break: break-all;
      "
    >
      ZASHBOARD DEBUG: HTML loaded, inline JS running...
    </div>
    <script>
      ;(function () {
        var step = 0
        var text = 'ZASHBOARD DEBUG'
        var bannerStyle =
          'position:fixed!important;top:0!important;left:0!important;right:0!important;background:#00cc00!important;color:white!important;padding:8px 10px!important;z-index:2147483647!important;font-size:11px!important;font-family:monospace!important;white-space:pre-wrap!important;word-break:break-all!important;pointer-events:none!important;opacity:1!important;display:block!important;visibility:visible!important;transform:none!important;'

        function ensureBanner() {
          var db = document.getElementById('debug-banner')
          if (!db) {
            db = document.createElement('div')
            db.id = 'debug-banner'
            document.body.appendChild(db)
          }
          db.style.cssText = bannerStyle
          db.textContent = text
          return db
        }

        function log(msg) {
          step++
          text += '\n[' + step + '] ' + msg
          ensureBanner()
        }

        log('Inline JS OK')

        window.onerror = function (msg, src, line, col, err) {
          log('ERR: ' + msg + ' (' + (src || '').split('/').pop() + ':' + line + ')')
          ensureBanner().style.background = 'red!important'
        }
        window.addEventListener('unhandledrejection', function (e) {
          log('REJ: ' + (e.reason ? e.reason.message || String(e.reason).slice(0, 100) : '?'))
          ensureBanner().style.background = 'red!important'
        })

        // Heartbeat: ensure banner exists every 500ms for 20 seconds
        var count = 0
        var iv = setInterval(function () {
          count++
          var app = document.getElementById('app')
          var ch = app ? app.children.length : -1
          if (count % 2 === 0) log('t=' + count / 2 + 's app=' + ch)
          ensureBanner()
          if (count >= 40) clearInterval(iv)
        }, 500)
      })()
    </script>
    <script>
      ;(function () {
        const media = window.matchMedia('(prefers-color-scheme: dark)')
        const favicon = document.getElementById('favicon')
        const setFavicon = (isDark) => {
          favicon.href = isDark ? './favicon-dark.svg' : './favicon.svg'
        }

        media.addEventListener('change', () => {
          setFavicon(media.matches)
        })
        setFavicon(media.matches)
      })()
    </script>
    <script
      type="module"
      src="/src/main.ts"
    ></script>
  </body>
</html>
