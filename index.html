<!doctype html>
<html lang="">
  <head>
    <meta charset="UTF-8" />
    <title>zashboard</title>
    <meta
      name="viewport"
      content="user-scalable=no, width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
    />
    <meta
      name="description"
      content="A dashboard using clash API"
    />
    <link
      rel="apple-touch-icon"
      href="./apple-touch-icon.png"
    />
    <link
      rel="icon"
      href="./favicon.ico"
      sizes="48x48"
    />
    <link
      id="favicon"
      rel="icon"
      href="./favicon.svg"
      sizes="any"
      type="image/svg+xml"
    />
    <meta
      name="theme-color"
      content="#FFFFFF"
    />
    <meta
      name="rocket-loader"
      content="false"
    />
  </head>
  <body class="h-dvh w-screen">
    <div id="app"></div>
    <div
      id="debug-banner"
      style="
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        background: #00cc00;
        color: white;
        padding: 8px 10px;
        z-index: 999999;
        font-size: 11px;
        font-family: monospace;
        white-space: pre-wrap;
        word-break: break-all;
      "
    >
      ZASHBOARD DEBUG: HTML loaded, inline JS running...
    </div>
    <script>
      ;(function () {
        var step = 0
        function log(msg) {
          step++
          var db = document.getElementById('debug-banner')
          if (!db) {
            db = document.createElement('div')
            db.id = 'debug-banner'
            db.style.cssText =
              'position:fixed;top:0;left:0;right:0;background:red;color:white;padding:8px 10px;z-index:999999;font-size:11px;font-family:monospace;white-space:pre-wrap;word-break:break-all;'
            document.body.prepend(db)
          }
          db.textContent += '\n[' + step + '] ' + msg
        }
        log('Inline JS running...')

        // Protect banner from removal
        var observer = new MutationObserver(function (mutations) {
          mutations.forEach(function (m) {
            m.removedNodes.forEach(function (n) {
              if (
                n.id === 'debug-banner' ||
                (n.contains && n.contains(document.getElementById('debug-banner')))
              ) {
                document.body.prepend(n)
                log('Banner removed! Re-added.')
              }
            })
          })
        })
        observer.observe(document.body, { childList: true })

        window.onerror = function (msg, src, line, col, err) {
          log('ERROR: ' + msg + ' (' + src + ':' + line + ')')
          var db = document.getElementById('debug-banner')
          if (db) db.style.background = 'red'
        }
        window.addEventListener('unhandledrejection', function (e) {
          log('PROMISE: ' + (e.reason ? e.reason.message || e.reason : e))
          var db = document.getElementById('debug-banner')
          if (db) db.style.background = 'red'
        })

        log('Handlers set. Module script next...')

        setTimeout(function () {
          log(
            '1s: body=' +
              document.body.children.length +
              ', app=' +
              document.getElementById('app').children.length,
          )
        }, 1000)
        setTimeout(function () {
          log(
            '3s: body=' +
              document.body.children.length +
              ', app=' +
              document.getElementById('app').children.length,
          )
          var banner = document.getElementById('debug-banner')
          if (banner) {
            log(
              '3s: banner in DOM=' +
                true +
                ', display=' +
                getComputedStyle(banner).display +
                ', vis=' +
                getComputedStyle(banner).visibility,
            )
          } else {
            log('3s: banner NOT in DOM!')
          }
        }, 3000)
        setTimeout(function () {
          var app = document.getElementById('app')
          log('5s: #app children=' + app.children.length)
          if (app.children.length === 0) log('Vue did NOT mount!')
          else log('Vue mounted OK.')
        }, 5000)
      })()
    </script>
    <script>
      ;(function () {
        const media = window.matchMedia('(prefers-color-scheme: dark)')
        const favicon = document.getElementById('favicon')
        const setFavicon = (isDark) => {
          favicon.href = isDark ? './favicon-dark.svg' : './favicon.svg'
        }

        media.addEventListener('change', () => {
          setFavicon(media.matches)
        })
        setFavicon(media.matches)
      })()
    </script>
    <script
      type="module"
      src="/src/main.ts"
    ></script>
  </body>
</html>
